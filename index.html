<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joon Park</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/b90d233a4a.js" crossorigin="anonymous"></script>
</head>
<body>
  <section id="about-me">
    <nav>
        <div class="personal__logo">Joon Park</div>
        <ul class="nav__link--list">
          <li>
            <a href="" class="
            nav__link--anchor
            link__hover-effect
            link__hover-effect--black
            ">Languages</a>
          </li>
          <li>
            <a href="" class="
            nav__link--anchor
            link__hover-effect
            link__hover-effect--black
            ">Projects</a>
          </li>
          <li>
            <a href="" class="
            nav__link--anchor
            nav__link--anchor-primary
            ">Contact</a>
          </li>
        </ul>
    </nav>
    <div class="flex flex-1">
        <div class="about-me__info row">
            <div class="about-me__info--container">
                <figure class="about-me__picture--mask">
                    <img src="./Assets/JoonPark.jpeg" class="about-me__picture"alt="Picture of me">
                </figure>
                <h1 class="about-me__info--title">
                    Hey! I'm <span class="text-purple">Joon Park</span>
                </h1>
                <p class="about-me__info--para">
                    I'm a student at <strong class="text--purple">Frontend Simplified</strong>, 
                    learning this new skill so I can become a frontend developer.
                    I hope this course will really help me land a job in tech!!!
                    Woohooo!!!!
                </p>
                <div class="about-me__links">
                    <a href="" class="about-me__link">
                      <i class="fa-brands fa-linkedin"></i>
                    </a>
                    <a href="" class="about-me__link">
                      <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="" class="about-me__link">
                      <i class="fa-solid fa-at"></i>
                    </a>
                    <a href="" class="about-me__link">
                      <i class="fa-regular fa-file-pdf"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
  </section>  
</body>
</html>
